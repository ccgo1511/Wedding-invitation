<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400&family=Cairo:wght@200;400;700&family=Tajawal:wght@200;400;500&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Realistic Envelope Colors (Matching the Reference Image) */
            --env-paper: #EFECE4;
            /* Pale cream/ivory */
            --env-bg-inner: #E2DFD6;
            --env-shadow: rgba(0, 0, 0, 0.08);

            /* Wax Seal Colors (Pale Blush Pink) */
            --seal-base: #e3ccce;
            --seal-light: #f6eaeb;
            --seal-dark: #c4a9ac;
            --seal-text: #bda2a5;

            /* Gold Foil */
            --gold-light: #fcf6ba;
            --gold-mid: #bf953f;
            --gold-dark: #a67c00;

            /* Content Colors */
            --bg-color: #FAFAFA;
            --text-main: #2D2D2D;
            --text-light: #555555;
            --gold: #c9a050;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            min-height: 100%;
            background-color: #F5F5F7;
            /* Soft background behind envelope */
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ==================== Realistic Envelope Container ==================== */
        .envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(245, 245, 247, 0.95);
            z-index: 999;
            transition: opacity 1s ease 0.8s, visibility 1s ease 0.8s;
        }

        .envelope-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            transition: opacity 2.5s ease 0.8s, visibility 2.5s ease 0.8s, transform 3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .envelope-wrapper.opened {
            transform: scale(1.02);
        }


        .envelope-wrapper.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.05);
            pointer-events: none;
        }

        /* Paper Texture applied to all envelope parts */
        .paper {
            background-color: var(--env-paper);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--env-bg-inner);
            z-index: 1001;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.03);
            border-radius: 2px;
        }

        /* Side Flaps */
        .envelope-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(0 0, 55% 50%, 0 100%);
            z-index: 1002;
            filter: drop-shadow(4px 0 6px var(--env-shadow));
        }

        .envelope-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(100% 0, 45% 50%, 100% 100%);
            z-index: 1002;
            filter: drop-shadow(-4px 0 6px var(--env-shadow));
        }

        /* Bottom Flap */
        .envelope-bottom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(0 100%, 50% 45%, 100% 100%);
            z-index: 1003;
            filter: drop-shadow(0 -4px 8px var(--env-shadow));
        }

        /* Top Flap Shadow & Flap */
        .envelope-flap-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
            z-index: 1004;
            pointer-events: none;
        }

        .envelope-flap-shadow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top center;
            transition: transform 2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top center;
            transition: transform 2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 1005;
        }

        .envelope-wrapper.opened .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-wrapper.opened .envelope-flap-shadow::before {
            transform: rotateX(180deg);
        }

        /* Realistic Wax Seal */
        .wax-seal-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1006;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 1s ease;
        }

        .envelope-wrapper.opened .wax-seal-container {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            pointer-events: none;
        }

        .wax-seal {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle at 30% 30%, var(--seal-light) 0%, var(--seal-base) 60%, var(--seal-dark) 100%);
            border-radius: 50%;
            position: relative;
            box-shadow:
                0 6px 12px rgba(0, 0, 0, 0.15),
                inset 0 2px 4px rgba(255, 255, 255, 0.9);
        }

        .seal-inner-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, var(--seal-light) 0%, var(--seal-base) 60%, var(--seal-dark) 100%);
            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.15),
                0 1px 2px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seal-inner-ring::after {
            content: 'F&M';
            font-family: 'Great Vibes', cursive;
            font-size: 26px;
            color: var(--seal-text);
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.6), -1px -1px 0 rgba(0, 0, 0, 0.1);
        }

        .seal-hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            color: var(--text-light);
            white-space: nowrap;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        @keyframes pulseFlat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        .pulse {
            animation: pulseFlat 2s infinite ease-in-out;
        }

        /* Sparkles */
        .sparkle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
        }

        .sparkle-burst.active {
            opacity: 1;
            animation: burstOut 1.2s ease-out forwards;
        }

        @keyframes burstOut {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .sparkle-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--gold-light);
            border-radius: 50%;
            animation: sparkleFly 1s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }

            100% {
                transform: translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        /* ==================== Content ==================== */
        .content-wrapper {
            opacity: 0;
            transition: opacity 2s ease 0.5s;
        }

        .content-wrapper.visible {
            opacity: 1;
        }

        /* Hero Section (Text Over Image) */
        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            clip-path: inset(15% 15% 15% 15% round 20px);
            transition: opacity 2.5s ease-out, clip-path 2.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .content-wrapper.visible .hero-bg {
            opacity: 1;
            clip-path: inset(0 0 0 0 round 0px);
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.2);
            transition: transform 12s ease-out;
        }

        .content-wrapper.visible .hero-bg img {
            transform: scale(1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            color: #fff;
            max-width: 800px;
            transform: translateY(20px);
            transition: transform 2s ease 0.5s;
        }

        .content-wrapper.visible .hero-content {
            transform: translateY(0);
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            font-weight: 200;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .names-title {
            font-family: 'Aref Ruqaa', serif;
            font-size: 5.5rem;
            margin-bottom: 40px;
            font-weight: 400;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        }

        .and-sign {
            display: block;
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--gold);
            margin: 10px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .intro-text {
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 2;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: #fff;
            font-size: 24px;
            animation: bounce 2s infinite;
            opacity: 0.8;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) translateX(-50%);
            }

            40% {
                transform: translateY(-15px) translateX(-50%);
            }

            60% {
                transform: translateY(-7px) translateX(-50%);
            }
        }

        /* Details Section */
        .details-section {
            padding: 100px 20px;
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--bg-color);
        }

        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 100px;
        }

        .count-box {
            text-align: center;
        }

        .count-num {
            font-family: 'Cairo', sans-serif;
            font-size: 3.5rem;
            font-weight: 200;
            display: block;
            color: var(--gold);
        }

        .count-label {
            font-size: 0.9rem;
            color: var(--text-light);
            letter-spacing: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            text-align: center;
        }

        .info-item {
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(201, 160, 80, 0.2);
        }

        .info-label {
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 15px;
            display: block;
        }

        .info-value {
            font-size: 1.3rem;
            color: var(--text-main);
            font-weight: 400;
        }

        .map-section {
            margin-top: 80px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: 4px solid #fff;
        }

        .map-section iframe {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }

        @media (max-width: 600px) {
            .names-title {
                font-size: 3.5rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .countdown-wrap {
                gap: 20px;
            }

            .count-num {
                font-size: 2.5rem;
            }

            .hero-content {
                padding: 15px;
            }

            .details-section {
                padding: 60px 15px;
            }

            .wax-seal {
                width: 60px;
                height: 60px;
            }

            .seal-inner-ring {
                width: 48px;
                height: 48px;
            }

            .seal-inner-ring::after {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Overlay & Envelope -->
    <div class="envelope-overlay" id="envelopeOverlay"></div>
    <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope-back paper"></div>
        <div class="envelope-left paper"></div>
        <div class="envelope-right paper"></div>
        <div class="envelope-bottom paper"></div>

        <div class="envelope-flap-shadow"></div>
        <div class="envelope-flap paper">
        </div>

        <div class="wax-seal-container pulse" id="sealBtn">
            <div class="wax-seal">
                <span class="seal-inner-ring"></span>
            </div>
            <p class="seal-hint">انقر لفتح الدعوة</p>
        </div>
    </div>

    <!-- Content -->
    <div class="content-wrapper" id="contentWrapper">

        <!-- Hero Section (Text Over Image) -->
        <div class="hero-section">
            <div class="hero-bg">
                <!-- استخدام صورتك هنا -->
                <img src="wedding.jpg"
                alt="صورة الزفاف"
                onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80';">
                <div class="hero-overlay"></div>
            </div>

            <div class="hero-content">
                <div class="bismillah">بسم الله الرحمن الرحيم</div>
                <div class="names-title">
                    فجعة
                    <span class="and-sign">و</span>
                    محمد
                </div>
                <div class="intro-text">
                    نتشرف بدعوتكم لمشاركتنا لحظات الفرح والسعادة في حفل زفافنا، حضوركم يكمل بهجتنا.
                </div>
            </div>

            <div class="scroll-down">↓</div>
        </div>

        <!-- Details Section -->
        <div class="details-section">
            <div class="countdown-wrap">
                <div class="count-box">
                    <span class="count-num" id="days">00</span>
                    <span class="count-label">يوم</span>
                </div>
                <div class="count-box">
                    <span class="count-num" id="hours">00</span>
                    <span class="count-label">ساعة</span>
                </div>
                <div class="count-box">
                    <span class="count-num" id="minutes">00</span>
                    <span class="count-label">دقيقة</span>
                </div>
                <div class="count-box">
                    <span class="count-num" id="seconds">00</span>
                    <span class="count-label">ثانية</span>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">التاريخ</span>
                    <span class="info-value">الخميس، 20 أغسطس 2026</span>
                </div>
                <div class="info-item">
                    <span class="info-label">الوقت</span>
                    <span class="info-value">الساعة السابعة مساءً</span>
                </div>
                <div class="info-item">
                    <span class="info-label">المكان</span>
                    <span class="info-value">قاعة الياسمين، الرياض</span>
                </div>
                <div class="info-item">
                    <span class="info-label">ملاحظة</span>
                    <span class="info-value">يمنع اصطحاب الأطفال</span>
                </div>
            </div>

            <div class="map-section">
                <iframe
                    src="https://maps.google.com/maps?q=%D9%82%D8%A7%D8%B9%D8%A9+%D8%A7%D9%84%D9%8A%D8%A7%D8%B3%D9%85%D9%8A%D9%86+%D8%A7%D9%84%D8%B1%D9%8A%D8%A7%D8%B6&t=&z=14&ie=UTF8&iwloc=&output=embed"
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>

    </div>

    <script>
        (function () {
            const sealBtn = document.getElementById('sealBtn');
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const envelopeOverlay = document.getElementById('envelopeOverlay');
            const contentWrapper = document.getElementById('contentWrapper');
            const weddingDate = new Date(2026, 7, 20, 19, 0, 0);
            let isOpened = false;

            function createSparkleBurst(x, y) {
                const burst = document.createElement('div');
                burst.classList.add('sparkle-burst');
                burst.style.left = x + 'px';
                burst.style.top = y + 'px';

                for (let i = 0; i < 30; i++) {
                    const dot = document.createElement('div');
                    dot.classList.add('sparkle-dot');
                    const angle = (Math.PI * 2 * i) / 30;
                    const distance = Math.random() * 80 + 30;
                    dot.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                    dot.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                    dot.style.animationDelay = Math.random() * 0.2 + 's';
                    dot.style.animationDuration = Math.random() * 0.6 + 0.5 + 's';
                    burst.appendChild(dot);
                }
                document.body.appendChild(burst);
                requestAnimationFrame(() => burst.classList.add('active'));
                setTimeout(() => burst.remove(), 1000);
            }

            sealBtn.addEventListener('click', function () {
                if (isOpened) return;
                isOpened = true;

                const rect = this.getBoundingClientRect();
                createSparkleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

                envelopeWrapper.classList.add('opened');

                setTimeout(() => {
                    envelopeWrapper.classList.add('hidden');
                    envelopeOverlay.classList.add('hidden');
                    contentWrapper.classList.add('visible');

                    window.scrollTo(0, 0);
                }, 1800);
            });

            function updateCountdown() {
                const now = new Date();
                const diff = weddingDate - now;

                if (diff <= 0) {
                    document.getElementById('days').textContent = '00';
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                document.getElementById('days').textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById('hours').textContent = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById('minutes').textContent = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById('seconds').textContent = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();
    </script>
</body>

</html>
